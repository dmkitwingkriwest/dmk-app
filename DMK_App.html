      const addPageNumbers = (doc) => {
          const pageCount = doc.internal.getNumberOfPages();

          const lastFontStyle = doc.internal.fontStyle;
          const lastFontSize = doc.internal.getFontSize();

          doc.setFont('helvetica', 'normal');
          doc.setFontSize(10);

          for (let i = 1; i <= pageCount; i++) {
              doc.setPage(i);
              doc.text('Page ' + String(i) + ' of ' + String(pageCount), doc.internal.pageSize.width / 2, doc.internal.pageSize.height - 10, { align: 'center' });
          }
          
          doc.setFont(lastFontName, lastFontStyle);
          doc.setFontSize(lastFontSize);
